<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple To‑Do List</title>
  <style>
    :root{--bg:#f3f4f6;--card:#ffffff;--accent:#2563eb;--danger:#ef4444;--muted:#6b7280}
    *{box-sizing:border-box}
    body{font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial; background:var(--bg); margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px}

    .card{width:100%; max-width:520px; background:var(--card); border-radius:12px; box-shadow:0 6px 24px rgba(15,23,42,0.06); padding:20px}
    h1{margin:0 0 12px; font-size:20px}
    p.lead{margin:0 0 18px; color:var(--muted); font-size:14px}

    .input-row{display:flex; gap:8px}
    input[type="text"]{flex:1; padding:10px 12px; font-size:15px; border-radius:8px; border:1px solid #e5e7eb}
    button#addBtn{padding:10px 14px; border-radius:8px; border:0; background:var(--accent); color:#fff; font-weight:600; cursor:pointer}
    button#addBtn[disabled]{opacity:0.6; cursor:not-allowed}

    ul.todo-list{list-style:none; margin:18px 0 0; padding:0}
    li.todo{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 12px; border-radius:8px; border:1px solid #f3f4f6; margin-bottom:10px}
    .todo .text{flex:1; word-break:break-word}
    .controls{display:flex; gap:8px; align-items:center}
    .btn-delete{background:transparent; border:1px solid var(--danger); color:var(--danger); padding:6px 8px; border-radius:8px; cursor:pointer}

    @media (max-width:420px){ .card{padding:16px} }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Simple To‑Do List</h1>
    <p class="lead">Add tasks with the input below. Each item has a delete button.</p>

    <div class="input-row">
      <input id="todoInput" type="text" placeholder="Type a task and press Add or Enter" aria-label="New todo" />
      <button id="addBtn" aria-label="Add todo">Add</button>
    </div>

    <ul id="todoList" class="todo-list" aria-live="polite"></ul>
  </main>

  <script>
    const input = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('todoList');

    function createTodoItem(text){
      const li = document.createElement('li');
      li.className = 'todo';

      const span = document.createElement('div');
      span.className = 'text';
      span.textContent = text;

      const controls = document.createElement('div');
      controls.className = 'controls';

      const del = document.createElement('button');
      del.className = 'btn-delete';
      del.type = 'button';
      del.textContent = 'Delete';
      del.setAttribute('aria-label', `Delete ${text}`);
      del.addEventListener('click', () => {
        li.remove();
        input.focus();
      });

      controls.appendChild(del);
      li.appendChild(span);
      li.appendChild(controls);
      return li;
    }

    function addTodo(){
      const text = input.value.trim();
      if(!text) return;
      const item = createTodoItem(text);
      list.prepend(item);
      input.value = '';
      input.focus();
      updateAddButton();
    }

    function updateAddButton(){
      addBtn.disabled = input.value.trim() === '';
    }

    // events
    addBtn.addEventListener('click', addTodo);
    input.addEventListener('input', updateAddButton);
    input.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') addTodo();
    });

    // initial state
    updateAddButton();
  </script>
</body>
</html>
